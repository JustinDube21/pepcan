<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <defs>
    <linearGradient id="redGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF1A1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CC0000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0E0E0;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Molecular/Peptide hexagon ring behind maple leaf -->
  <g transform="translate(60, 60)" filter="url(#glow)">
    <!-- Hex ring nodes -->
    <circle cx="0" cy="-32" r="3" fill="url(#redGlow)" opacity="0.7"/>
    <circle cx="28" cy="-16" r="3" fill="url(#redGlow)" opacity="0.7"/>
    <circle cx="28" cy="16" r="3" fill="url(#redGlow)" opacity="0.7"/>
    <circle cx="0" cy="32" r="3" fill="url(#redGlow)" opacity="0.7"/>
    <circle cx="-28" cy="16" r="3" fill="url(#redGlow)" opacity="0.7"/>
    <circle cx="-28" cy="-16" r="3" fill="url(#redGlow)" opacity="0.7"/>
    <!-- Hex ring connections -->
    <line x1="0" y1="-32" x2="28" y2="-16" stroke="#FF1A1A" stroke-width="1" opacity="0.4"/>
    <line x1="28" y1="-16" x2="28" y2="16" stroke="#FF1A1A" stroke-width="1" opacity="0.4"/>
    <line x1="28" y1="16" x2="0" y2="32" stroke="#FF1A1A" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="32" x2="-28" y2="16" stroke="#FF1A1A" stroke-width="1" opacity="0.4"/>
    <line x1="-28" y1="16" x2="-28" y2="-16" stroke="#FF1A1A" stroke-width="1" opacity="0.4"/>
    <line x1="-28" y1="-16" x2="0" y2="-32" stroke="#FF1A1A" stroke-width="1" opacity="0.4"/>
    <!-- Extended molecular bonds -->
    <line x1="0" y1="-32" x2="0" y2="-44" stroke="#FF1A1A" stroke-width="1" opacity="0.3"/>
    <circle cx="0" cy="-46" r="2" fill="#FF1A1A" opacity="0.5"/>
    <line x1="28" y1="-16" x2="40" y2="-22" stroke="#FF1A1A" stroke-width="1" opacity="0.3"/>
    <circle cx="42" cy="-23" r="2" fill="#FF1A1A" opacity="0.5"/>
    <line x1="28" y1="16" x2="40" y2="22" stroke="#FF1A1A" stroke-width="1" opacity="0.3"/>
    <circle cx="42" cy="23" r="2" fill="#FF1A1A" opacity="0.5"/>
    <line x1="-28" y1="16" x2="-40" y2="22" stroke="#FF1A1A" stroke-width="1" opacity="0.3"/>
    <circle cx="-42" cy="23" r="2" fill="#FF1A1A" opacity="0.5"/>
    <line x1="-28" y1="-16" x2="-40" y2="-22" stroke="#FF1A1A" stroke-width="1" opacity="0.3"/>
    <circle cx="-42" cy="-23" r="2" fill="#FF1A1A" opacity="0.5"/>
  </g>

  <!-- Maple Leaf (Canadian symbol) -->
  <g transform="translate(60, 60) scale(0.55)">
    <path d="M0,-50 L5,-35 L20,-40 L15,-25 L30,-25 L20,-12 L28,0 L15,-5 L12,10 L0,2 L-12,10 L-15,-5 L-28,0 L-20,-12 L-30,-25 L-15,-25 L-20,-40 L-5,-35 Z"
          fill="url(#redGlow)" filter="url(#glow)"/>
    <!-- Stem -->
    <rect x="-3" y="10" width="6" height="18" rx="2" fill="url(#redGlow)"/>
  </g>

  <!-- PEPTIDES text -->
  <text x="115" y="52" font-family="'Instrument Sans', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="37" fill="url(#textGrad)" letter-spacing="3">PEPTIDES</text>

  <!-- CANADA text -->
  <text x="115" y="82" font-family="'Instrument Sans', 'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="27" fill="#FF1A1A" letter-spacing="7">CANADA</text>

  <!-- Tagline -->
  <text x="115" y="102" font-family="'Manrope', 'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="10.5" fill="#888888" letter-spacing="2.6">RESEARCH &amp; INNOVATION</text>
</svg>
